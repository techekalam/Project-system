{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
  <div class="card" style="max-width:560px;">
    <h2>Login</h2>
    <p class="muted">Use a demo account from the README, or your own.</p>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="form-row">
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="muted">{{ field.errors }}</div>{% endif %}
        </div>
      {% endfor %}
      <div class="actions">
        <button class="btn primary" type="submit">Sign in</button>
        <a class="btn" href="{% url 'sis:signup' %}">Student signup</a>
      </div>
    </form>
  </div>
{% endblock %}
