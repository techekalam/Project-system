{% csrf_token %}
{% for field in form %}
  <div class="form-row">
    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}<div class="muted">{{ field.help_text }}</div>{% endif %}
    {% if field.errors %}<div class="muted">{{ field.errors }}</div>{% endif %}
  </div>
{% endfor %}
