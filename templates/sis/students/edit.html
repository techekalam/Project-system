{% extends "base.html" %}
{% block title %}Edit student {{ student.student_id }}{% endblock %}
{% block content %}
  <div class="card">
    <h2 style="margin-top:0;">Edit student</h2>
    <p class="muted">Editing: <strong>{{ student.student_id }}</strong> ({{ student.user.username }})</p>
    <form method="post">
      {% include "sis/_form.html" %}
      <div class="actions">
        <button class="btn primary" type="submit">Save changes</button>
        <a class="btn" href="{% url 'sis:student_detail' pk=student.pk %}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
