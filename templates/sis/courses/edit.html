{% extends "base.html" %}
{% block title %}Edit course {{ course.code }}{% endblock %}
{% block content %}
  <div class="card">
    <h2 style="margin-top:0;">Edit course</h2>
    <p class="muted">Editing: <strong>{{ course.code }}</strong></p>
    <form method="post">
      {% include "sis/_form.html" %}
      <div class="actions">
        <button class="btn primary" type="submit">Save changes</button>
        <a class="btn" href="{% url 'sis:course_detail' pk=course.pk %}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
